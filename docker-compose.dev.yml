services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tech_v2
      POSTGRES_USER: ${DB_USER:-techv2}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-techv2} -d tech_v2"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-techv2}:${DB_PASSWORD}@db:5432/tech_v2
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN:-7d}
      ENTRA_TENANT_ID: ${ENTRA_TENANT_ID}
      ENTRA_CLIENT_ID: ${ENTRA_CLIENT_ID}
      ENTRA_CLIENT_SECRET: ${ENTRA_CLIENT_SECRET}
      REDIRECT_URI: ${REDIRECT_URI}
      ENTRA_ADMIN_GROUP_ID: ${ENTRA_ADMIN_GROUP_ID}
      ENTRA_FINANCE_DIRECTOR_GROUP_ID: ${ENTRA_FINANCE_DIRECTOR_GROUP_ID}
      ENTRA_DIRECTOR_OF_SCHOOLS_GROUP_ID: ${ENTRA_DIRECTOR_OF_SCHOOLS_GROUP_ID}
      ENTRA_ASST_DIRECTOR_OF_SCHOOLS_GROUP_ID: ${ENTRA_ASST_DIRECTOR_OF_SCHOOLS_GROUP_ID}
      ENTRA_TRANSPORTATION_SECRETARY_GROUP_ID: ${ENTRA_TRANSPORTATION_SECRETARY_GROUP_ID}
      ENTRA_PRINCIPALS_GROUP_ID: ${ENTRA_PRINCIPALS_GROUP_ID}
      ENTRA_VICE_PRINCIPALS_GROUP_ID: ${ENTRA_VICE_PRINCIPALS_GROUP_ID}
      ENTRA_MAINTENANCE_DIRECTOR_GROUP_ID: ${ENTRA_MAINTENANCE_DIRECTOR_GROUP_ID}
      ENTRA_TRANSPORTATION_DIRECTOR_GROUP_ID: ${ENTRA_TRANSPORTATION_DIRECTOR_GROUP_ID}
      ENTRA_TECHNOLOGY_DIRECTOR_GROUP_ID: ${ENTRA_TECHNOLOGY_DIRECTOR_GROUP_ID}
      ENTRA_AFTERSCHOOL_DIRECTOR_GROUP_ID: ${ENTRA_AFTERSCHOOL_DIRECTOR_GROUP_ID}
      ENTRA_NURSE_DIRECTOR_GROUP_ID: ${ENTRA_NURSE_DIRECTOR_GROUP_ID}
      ENTRA_SPED_DIRECTOR_GROUP_ID: ${ENTRA_SPED_DIRECTOR_GROUP_ID}
      ENTRA_FOOD_SERVICES_SUPERVISOR_GROUP_ID: ${ENTRA_FOOD_SERVICES_SUPERVISOR_GROUP_ID}
      ENTRA_FOOD_SERVICES_PO_ENTRY_GROUP_ID: ${ENTRA_FOOD_SERVICES_PO_ENTRY_GROUP_ID}
      ENTRA_FINANCE_PO_ENTRY_GROUP_ID: ${ENTRA_FINANCE_PO_ENTRY_GROUP_ID}
      ENTRA_PRE_K_DIRECTOR_GROUP_ID: ${ENTRA_PRE_K_DIRECTOR_GROUP_ID}
      ENTRA_CTE_DIRECTOR_GROUP_ID: ${ENTRA_CTE_DIRECTOR_GROUP_ID}
      ENTRA_TECH_ASSISTANTS_GROUP_ID: ${ENTRA_TECH_ASSISTANTS_GROUP_ID}
      ENTRA_OCBOE_LIBRARIANS_GROUP_ID: ${ENTRA_OCBOE_LIBRARIANS_GROUP_ID}
      ENTRA_ALL_STAFF_GROUP_ID: ${ENTRA_ALL_STAFF_GROUP_ID}
      ENTRA_ALL_STUDENTS_GROUP_ID: ${ENTRA_ALL_STUDENTS_GROUP_ID}
      ENTRA_SCHOOL_MAINTENANCE_GROUP_ID: ${ENTRA_SCHOOL_MAINTENANCE_GROUP_ID}
      ENTRA_COUNTY_WIDE_MAINTENANCE_GROUP_ID: ${ENTRA_COUNTY_WIDE_MAINTENANCE_GROUP_ID}
      CORS_ORIGIN: "http://localhost"
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      APP_URL: ${APP_URL:-http://localhost}
      TZ: ${TZ:-America/Chicago}
      BACKUP_DIR: /backups
      BACKUP_RETAIN_COUNT: ${BACKUP_RETAIN_COUNT:-7}
      DB_USER: ${DB_USER:-techv2}
      DB_PASSWORD: ${DB_PASSWORD}
      MAINTENANCE_MODE: ${MAINTENANCE_MODE:-false}
      PROVISIONING_SYNC_SCHEDULE: ${PROVISIONING_SYNC_SCHEDULE:-0 */2 * * *}
      SIS_STAFF_CSV: ${SIS_STAFF_CSV:-/sis-data/staff.csv}
      SIS_STUDENT_CSV: ${SIS_STUDENT_CSV:-/sis-data/students.csv}
      SIS_SMB_SHARE: ${SIS_SMB_SHARE:-}
      PROVISIONING_REPORT_EMAIL: ${PROVISIONING_REPORT_EMAIL:-}
      PROVISIONING_TEST_MODE: ${PROVISIONING_TEST_MODE:-true}
      PROVISIONING_DEFAULT_STAFF_PASSWORD: ${PROVISIONING_DEFAULT_STAFF_PASSWORD:-}
      PROVISIONING_DEFAULT_STUDENT_PASSWORD: ${PROVISIONING_DEFAULT_STUDENT_PASSWORD:-}
      PROVISIONING_TENANT_ID: ${PROVISIONING_TENANT_ID:-}
      PROVISIONING_CLIENT_ID: ${PROVISIONING_CLIENT_ID:-}
      PROVISIONING_CLIENT_SECRET: ${PROVISIONING_CLIENT_SECRET:-}
      PROVISIONING_STAFF_GROUP_ID: ${PROVISIONING_STAFF_GROUP_ID:-}
      PROVISIONING_STUDENT_GROUP_ID: ${PROVISIONING_STUDENT_GROUP_ID:-}
    volumes:
      - backend_logs_dev:/workspace/backend/logs
      - backend_uploads_dev:/workspace/backend/public/uploads
      - backup_local_dev:/backups
      - sis_data_dev:/sis-data:ro
    ports:
      - "3000:3000"
    command: sh -c "npx prisma migrate deploy && node dist/server.js"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./frontend/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro

  # ── Test services (profile: test) ─────────────────────────────────────────
  # Not started during normal dev (`docker compose up`). Activated only when
  # the `--profile test` flag is passed (e.g. from scripts/preflight.ps1 step 3).

  db-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tech_v2_test
      POSTGRES_USER: techv2test
      POSTGRES_PASSWORD: testpass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techv2test -d tech_v2_test"]
      interval: 5s
      timeout: 3s
      retries: 10
    profiles:
      - test

  backend-test:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: test
    depends_on:
      db-test:
        condition: service_healthy
    environment:
      NODE_ENV: test
      DATABASE_URL: postgresql://techv2test:testpass@db-test:5432/tech_v2_test
      JWT_ACCESS_SECRET: test-access-secret-min-32-chars-long-placeholder
      JWT_REFRESH_SECRET: test-refresh-secret-min-32-chars-long-placeholder
      ENTRA_CLIENT_ID: test-client-id
      ENTRA_CLIENT_SECRET: test-client-secret
      ENTRA_TENANT_ID: test-tenant-id
      REDIRECT_URI: http://localhost:3000/api/auth/callback
      ENTRA_ADMIN_GROUP_ID: test-admin-group-id
      GROUP_MEMBERSHIP_CACHE_TTL_MS: "999999999"
      ENTRA_TECH_ASSISTANTS_GROUP_ID: test-wo-level-5-group-id
      ENTRA_SCHOOL_MAINTENANCE_GROUP_ID: test-wo-level-3-group-id
      ENTRA_COUNTY_WIDE_MAINTENANCE_GROUP_ID: test-wo-county-maint-group-id
      ENTRA_PRINCIPALS_GROUP_ID: test-wo-level-3b-group-id
      ENTRA_ALL_STAFF_GROUP_ID: test-allstaff-group-id
      CORS_ORIGIN: "http://localhost"
    profiles:
      - test

volumes:
  pgdata_dev:
  backend_logs_dev:
  backend_uploads_dev:
  backup_local_dev:
  sis_data_dev:
    driver_opts:
      type: cifs
      device: "${SIS_SMB_SHARE:-//10.0.10.83/homes/edupoint}"
      o: "username=${SMB_USER:-},password=${SMB_PASS:-},vers=3.0,ro"
